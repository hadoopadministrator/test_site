<!DOCTYPE html>
<html>
<head>
  <title>Test Site</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    h1 {
      color: #2c3e50;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>My First Live Website 🚀</h1>
  <p id="text">This is version 3 🔥</p>
  <!-- <p id="text">This is version 2</p> -->

  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.getElementById("text").innerText = "Button Clicked!";
    }
  </script>

</body>
</html>
